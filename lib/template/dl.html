<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>%s | File2Link</title>
<link rel="icon" href="https://i.ibb.co/KzqHfL05/photo-2026-02-07-13-38-13.jpg">
<meta property="og:title" content="%s">
<meta property="og:image" content="https://i.ibb.co/KzqHfL05/photo-2026-02-07-13-38-13.jpg">
<meta property="og:description" content="Download file instantly — powered by File2Link">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{
  --bg:#03050a;
  --surface:#080d14;
  --card:#0b1119;
  --border:rgba(0,229,204,.12);
  --cyan:#00e5cc;
  --cyan2:#00ffee;
  --red:#ff3d71;
  --text:#ddeeff;
  --muted:#4a6070;
  --r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:.022;pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,204,.011) 2px,rgba(0,229,204,.011) 4px);
  pointer-events:none;z-index:0;
}
.grid-bg{
  position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(0,229,204,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,204,.03) 1px,transparent 1px);
  background-size:52px 52px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 10%,transparent 75%);
}
.glow-center{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-55%);
  width:600px;height:500px;
  background:radial-gradient(ellipse,rgba(0,229,204,.06) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}

/* page layout */
.page{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* top nav */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;
  border-bottom:1px solid rgba(0,229,204,.07);
  background:rgba(3,5,10,.7);
  backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:100;
}
.brand{
  display:flex;align-items:center;gap:10px;
  font-family:'Bebas Neue',sans-serif;
  font-size:1.5rem;letter-spacing:.1em;
  color:var(--cyan);
  text-shadow:0 0 20px rgba(0,229,204,.35);
  text-decoration:none;
}
.brand-icon{
  width:32px;height:32px;border-radius:6px;
  background:var(--cyan);
  display:flex;align-items:center;justify-content:center;
  color:#03050a;font-size:.85rem;
  box-shadow:0 0 18px rgba(0,229,204,.45);
}
.nav-bot{
  display:flex;align-items:center;gap:8px;
  padding:7px 16px;border-radius:6px;
  background:rgba(0,229,204,.06);border:1px solid var(--border);
  color:var(--cyan);font-size:.75rem;font-family:'DM Mono',monospace;
  text-decoration:none;transition:all .2s;
}
.nav-bot:hover{background:rgba(0,229,204,.14);box-shadow:0 0 14px rgba(0,229,204,.15)}

/* main */
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px 60px}

/* file card */
.file-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:40px 36px;
  width:100%;max-width:480px;
  position:relative;overflow:hidden;
  box-shadow:0 0 60px rgba(0,229,204,.05),0 40px 80px rgba(0,0,0,.7);
  animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.98)}to{opacity:1;transform:none}}
/* top shimmer line */
.file-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 10%,var(--cyan) 50%,transparent 90%);
  background-size:200% 100%;
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{0%{background-position:-100% 0}100%{background-position:200% 0}}
/* corner accent */
.file-card::after{
  content:'';position:absolute;bottom:0;right:0;
  width:120px;height:120px;
  background:radial-gradient(circle at bottom right,rgba(0,229,204,.06),transparent 70%);
  pointer-events:none;
}

/* icon */
.ficon-wrap{
  width:76px;height:76px;margin:0 auto 24px;
  border-radius:16px;
  background:rgba(0,229,204,.07);
  border:1px solid rgba(0,229,204,.18);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;color:var(--cyan);
  box-shadow:0 0 30px rgba(0,229,204,.12);
  animation:float 4.5s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* file name */
.fname{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.45rem;letter-spacing:.04em;line-height:1.15;
  text-align:center;word-break:break-word;
  color:var(--text);margin-bottom:6px;
}
.fsub{
  text-align:center;font-size:.68rem;
  font-family:'DM Mono',monospace;color:var(--muted);
  letter-spacing:.06em;margin-bottom:28px;
}

/* badges */
.badges{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:30px}
.bp{
  font-size:.62rem;font-family:'DM Mono',monospace;
  padding:4px 12px;border-radius:3px;
  font-weight:500;letter-spacing:.08em;text-transform:uppercase;
}
.bp-c{background:rgba(0,229,204,.1);color:var(--cyan);border:1px solid rgba(0,229,204,.25)}
.bp-g{background:rgba(34,197,94,.08);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.bp-b{background:rgba(96,165,250,.08);color:#60a5fa;border:1px solid rgba(96,165,250,.2)}

/* download button */
.dl-btn{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:18px 24px;border-radius:10px;
  background:linear-gradient(135deg,var(--cyan) 0%,#00b89a 100%);
  color:#03050a;font-weight:700;font-size:.95rem;
  font-family:'DM Sans',sans-serif;letter-spacing:.01em;
  text-decoration:none;border:none;cursor:pointer;
  position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .2s,filter .2s;
  margin-bottom:12px;
}
.dl-btn::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
  transition:left .5s;
}
.dl-btn:hover::before{left:150%}
.dl-btn:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(0,229,204,.4);filter:brightness(1.06)}
.dl-btn:active{transform:translateY(0)}
.dl-btn-sub{font-size:.65rem;font-weight:500;opacity:.65;display:block;margin-top:1px}

/* share button */
.share-btn{
  display:flex;align-items:center;justify-content:center;gap:9px;
  width:100%;padding:13px 20px;border-radius:8px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:var(--muted);font-size:.8rem;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;
}
.share-btn:hover{background:rgba(0,229,204,.07);border-color:rgba(0,229,204,.2);color:var(--cyan)}

/* progress */
.dl-prog{margin-top:16px;display:none}
.dl-prog.on{display:block}
.prog-bar{width:100%;height:3px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--cyan),#00b89a);border-radius:999px;width:0;animation:prog 2.6s ease-out forwards}
@keyframes prog{to{width:100%}}
.prog-lbl{font-size:.67rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:7px;text-align:right}

/* chip strip */
.chip-strip{
  display:flex;flex-wrap:wrap;gap:10px;justify-content:center;
  width:100%;max-width:480px;margin-top:20px;
}
.chip{
  display:flex;align-items:center;gap:7px;
  padding:9px 18px;border-radius:8px;
  background:var(--card);border:1px solid var(--border);
  color:var(--muted);text-decoration:none;
  font-size:.75rem;font-weight:600;
  transition:all .2s;flex:1;min-width:130px;justify-content:center;
  font-family:'DM Sans',sans-serif;
}
.chip:hover{background:rgba(0,229,204,.07);border-color:rgba(0,229,204,.2);color:var(--cyan)}

/* footer */
.site-footer{
  border-top:1px solid rgba(0,229,204,.07);
  padding:20px 24px;text-align:center;
  background:rgba(3,5,10,.5);
}
.f-brand{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.1rem;letter-spacing:.08em;color:var(--cyan);opacity:.6;
}
.f-yr{font-size:.64rem;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace;letter-spacing:.04em}
.f-links{display:flex;justify-content:center;margin-top:8px}
.f-links a{font-size:.7rem;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:5px;transition:color .2s}
.f-links a:hover{color:var(--cyan)}

/* toast */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none}
.tp{
  background:rgba(3,5,10,.97);border:1px solid var(--border);backdrop-filter:blur(16px);
  border-radius:6px;padding:10px 20px;
  font-size:.77rem;font-family:'DM Mono',monospace;color:var(--text);
  display:flex;align-items:center;gap:9px;
  box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 20px rgba(0,229,204,.07);
  opacity:0;transform:translateY(12px);transition:opacity .22s,transform .22s;
  white-space:nowrap;
}
.tp.show{opacity:1;transform:translateY(0)}
.ti{color:var(--cyan)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(0,229,204,.15);border-radius:2px}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow-center"></div>
<div class="page">

  <!-- nav -->
  <header>
    <nav class="topbar">
      <a class="brand" href="https://t.me/file2linkkuttu_bot">
        <div class="brand-icon"><i class="fa-solid fa-play"></i></div>
        FILE2LINK
      </a>
      <a href="https://t.me/file2linkkuttu_bot" target="_blank" class="nav-bot">
        <i class="fa-brands fa-telegram"></i> Open Bot
      </a>
    </nav>
  </header>

  <!-- main -->
  <main class="main">
    <div class="file-card">
      <div class="ficon-wrap"><i class="fa-solid fa-file-video"></i></div>
      <div class="fname" id="fileTitle">%s</div>
      <div class="fsub">Ready to download &nbsp;·&nbsp; Hosted on Telegram</div>
      <div class="badges">
        <span class="bp bp-c"><i class="fa-solid fa-bolt" style="margin-right:3px"></i>Fast</span>
        <span class="bp bp-g"><i class="fa-solid fa-shield-halved" style="margin-right:3px"></i>Secure</span>
        <span class="bp bp-b"><i class="fa-solid fa-infinity" style="margin-right:3px"></i>Free</span>
      </div>
      <a href="%s" class="dl-btn" onclick="triggerDownload()">
        <i class="fa-solid fa-cloud-arrow-down" style="font-size:1.1rem"></i>
        <span>Download File<span class="dl-btn-sub" id="fileNameSub">_%s</span></span>
      </a>
      <button class="share-btn" onclick="shareFile()"><i class="fa-solid fa-share-nodes"></i> Share this file</button>
      <div class="dl-prog" id="dlProg">
        <div class="prog-bar"><div class="prog-fill"></div></div>
        <div class="prog-lbl" id="progLbl">Preparing download…</div>
      </div>
    </div>

    <div class="chip-strip">
      <a href="https://t.me/file2linkkuttu_bot" target="_blank" class="chip"><i class="fa-solid fa-fire"></i> Trending</a>
      <a href="https://t.me/file2linkkuttu_bot" target="_blank" class="chip"><i class="fa-solid fa-star"></i> New Releases</a>
      <a href="https://t.me/file2linkkuttu_bot" target="_blank" class="chip"><i class="fa-solid fa-tv"></i> Web Series</a>
    </div>
  </main>

  <!-- footer -->
  <footer class="site-footer">
    <div class="f-brand">FILE2LINK</div>
    <div class="f-links">
      <a href="https://t.me/file2linkkuttu_bot" target="_blank"><i class="fa-brands fa-telegram"></i>&nbsp;Telegram Bot</a>
    </div>
    <div class="f-yr">© <span id="yr"></span> File2Link · All rights reserved</div>
  </footer>
</div>

<div class="toast-wrap">
  <div class="tp" id="toast"><i class="fa-solid fa-check ti" id="ti"></i><span id="tm">Copied!</span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('yr').textContent=new Date().getFullYear();
const te=document.getElementById('fileTitle'),se=document.getElementById('fileNameSub');
if(te&&te.textContent.length>65)te.textContent=te.textContent.slice(0,65)+'…';
if(se&&se.textContent.length>45)se.textContent=se.textContent.slice(0,45)+'…';

function triggerDownload(){
  const w=document.getElementById('dlProg');w.classList.add('on');
  const f=w.querySelector('.prog-fill');f.style.animation='none';f.offsetHeight;f.style.animation='';
  setTimeout(()=>{document.getElementById('progLbl').textContent='Download started ✓';showToast('Download started!','fa-cloud-arrow-down')},2700);
}
function shareFile(){
  const d={title:document.title,url:location.href};
  navigator.share?navigator.share(d):navigator.clipboard.writeText(location.href).then(()=>showToast('Link copied!'));
}
let tt;
function showToast(msg,icon='fa-check'){
  const t=document.getElementById('toast');
  document.getElementById('tm').textContent=msg;
  document.getElementById('ti').className=`fa-solid ${icon} ti`;
  t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2700);
}
</script>
</body>
</html>
